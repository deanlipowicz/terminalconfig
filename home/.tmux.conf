# ──────────────────────────────────────────────
#  tmux Configuration
#  Catppuccin Mocha-inspired colour palette
# ──────────────────────────────────────────────

# -------- Mouse & Display --------
set -g mouse on
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -ga terminal-overrides '*:Ss=\E[%p1%d q:Se=\E[ q'
set -g allow-passthrough on
set -g focus-events on

# -------- Base Index (1, not 0) --------
set -g base-index 1
set -g pane-base-index 1

# -------- History --------
set -g history-limit 10000

# -------- Escape Delay --------
set -sg escape-time 10

# -------- Prefix: C-a (easier reach) --------
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# -----── Bind 'C-a C-a' to send literal C-a to apps --------
bind a send-prefix

# -------- Splitting --------
# 50/50 splits (equal halves)
bind | split-window -h -c "#{pane_current_path}"
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind _ split-window -v -c "#{pane_current_path}"

unbind '"'
unbind %

# -------- Vim-style Pane Navigation --------
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# -------- Resize Panes --------
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# -------- Window Management --------
bind c new-window -c "#{pane_current_path}"
bind , command-prompt -I "#W" { rename-window -- "%%" }
bind w choose-tree -Zw
bind x kill-pane
unbind '"'
unbind %

# -------- Reload Config --------
bind r source-file ~/.tmux.conf \; display-message "  tmux config reloaded"

# -------- Session Management --------
bind R command-prompt { rename-session -- "%%" }

# -------- Yazi popup (prefix + y) --------
bind y display-popup -h 70% -w 70% -E "yazi"

# -------- Copy Mode (vi keys) --------
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Y send-keys -X copy-line-and-cancel
bind -T copy-mode-vi Escape send-keys -X cancel

# -------- Clipboard sync (system clipboard via xclip) --------
set -g set-clipboard on
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard"

# -------- Paste --------
bind p paste-buffer

# -----── Custom Right-Click Menu --------
# Replaces the default pane menu with one showing the remapped splits
unbind -n MouseDown3Pane
bind -n MouseDown3Pane display-menu -T "#[align=centre]Pane #{pane_index}" -t = -x M -y M \
  "#[fg=#a6adc8]Splits" "" "" \
  "  Split Right  ( \\  or  | )" \\ "split-window -h -c '#{pane_current_path}'" \
  "  Split Below  ( -   or  _ )" - "split-window -v -c '#{pane_current_path}'" \
  "" "" "" \
  "Kill Pane              (x)" x "kill-pane" \
  "Fullscreen             (z)" z "resize-pane -Z" \
  "Rotate Panes           (o)" o "rotate-window" \
  "" "" "" \
  "Copy Mode     (Prefix+Enter)" Enter "copy-mode" \
  "Paste Buffer           (p)" p "paste-buffer"

# -----── Monitor Activity --------
setw -g monitor-activity on
set -g visual-activity off

# ──────────────────────────────────────────────
#  Styling (Catppuccin Mocha inspired)
# ──────────────────────────────────────────────

# Colours
set -g message-style "bg=#45475a,fg=#cdd6f4"
set -g message-command-style "bg=#45475a,fg=#cdd6f4"

# Status Bar
set -g status on
set -g status-interval 5
set -g status-position top

# Status Left: session name
set -g status-left-length 32
set -g status-left "#[bg=#89b4fa,fg=#1e1e2e,bold]  #S  "

# Status Right: hostname | date time
set -g status-right-length 80
set -g status-right "#[fg=#a6adc8]• #(uname -r | cut -d- -f1) • %Y-%m-%d %H:%M #[bg=#89b4fa,fg=#1e1e2e] #h "

# Status style
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

# Window list — default
setw -g window-status-format " #[fg=#585b70]#I:#W "
setw -g window-status-style "bg=#1e1e2e,fg=#585b70"

# Window list — current
setw -g window-status-current-format " #[bg=#89b4fa,fg=#1e1e2e,bold]#I:#W "
setw -g window-status-current-style "bg=#89b4fa,fg=#1e1e2e"

# Window list — activity bell
setw -g window-status-activity-style "bg=#1e1e2e,fg=#f9e2af"

# Window list — separator
setw -g window-status-separator ""

# Pane Borders — double lines create visual gap between panes
set -g pane-border-lines double
set -g pane-border-style "fg=#45475a,bg=#1e1e2e"
set -g pane-active-border-style "fg=#89b4fa,bg=#1e1e2e"

# Pane colours (fill unused area)
set -g pane-border-status off

# Bell
setw -g window-status-bell-style "bg=#f38ba8,fg=#1e1e2e"

# Popup / menu styling
set -g popup-style "bg=#1e1e2e,fg=#cdd6f4"
set -g popup-border-style "fg=#89b4fa"

# ──────────────────────────────────────────────
#  Display messages & shortcuts
# ──────────────────────────────────────────────

set -g display-panes-time 2000
set -g display-time 3000
set -g set-titles on
set -g set-titles-string "#S — #W"
